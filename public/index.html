<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IdeaRoots</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>IdeaRoots</h1>
      <p class="tagline">What's on your mind? Write it down and we'll find the thinkers who got there before you.</p>
    </header>

    <form id="idea-form">
      <textarea
        id="idea-input"
        placeholder="e.g. &quot;I think true freedom means letting go of what you can't control...&quot;"
        rows="3"
        maxlength="1000"
        required
      ></textarea>
      <button type="submit" id="submit-btn">Find who thought this before</button>
    </form>

    <section id="loading" class="hidden">
      <div class="loader"></div>
      <p>Looking through centuries of thought...</p>
    </section>

    <section id="results" class="hidden">
      <div id="best-match"></div>
      <div id="result-actions" class="hidden">
        <button id="save-btn" class="action-btn">Save this idea</button>
        <button id="share-btn" class="action-btn">Copy to share</button>
      </div>
      <div id="others-toggle" class="hidden">
        <button id="show-others" class="toggle-btn">See more voices</button>
      </div>
      <div id="others" class="hidden"></div>
    </section>

    <section id="saved-section" class="hidden">
      <h2 class="saved-title">My Ideas</h2>
      <div id="saved-list"></div>
      <button id="clear-saved" class="action-btn action-btn-subtle">Clear all saved ideas</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
